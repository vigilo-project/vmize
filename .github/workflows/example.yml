name: Example CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  chain-example:
    name: "chain example task"
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      VM_QEMU_ACCEL: tcg
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install VM dependencies and image
        run: |
          cd vm
          chmod +x ./deps.sh
          sudo ./deps.sh

      - name: Run chain example task
        run: cargo run -p vmize -- task worker/example/chain-task1

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chain-example-output
          path: |
            worker/example/chain-task1/output/
            worker/example/chain-task2/output/
          retention-days: 7
