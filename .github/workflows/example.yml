name: Example CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  chain-example:
    name: "chain example task"
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      VM_QEMU_ACCEL: tcg
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install VM dependencies and image
        run: |
          cd vm
          chmod +x ./deps.sh
          sudo ./deps.sh

      - name: Run chain example task
        run: cargo run -p vmize -- task worker/example/chain-task1

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chain-example-output
          path: |
            worker/example/chain-task1/output/
            worker/example/chain-task2/output/
          retention-days: 7

  package-manager-sample:
    name: "package-manager sample chain"
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      VM_QEMU_ACCEL: tcg
    steps:
      - name: Checkout vmize
        uses: actions/checkout@v4

      - name: Checkout package-manager
        uses: actions/checkout@v4
        with:
          repository: vigilo-project/package-manager
          path: package-manager

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install VM dependencies and image
        run: |
          cd vm
          chmod +x ./deps.sh
          sudo ./deps.sh

      - name: Run package-manager sample chain
        working-directory: package-manager
        env:
          VMIZE_GIT_URL: https://github.com/${{ github.repository }}.git
          VMIZE_GIT_REF: ${{ github.sha }}
          PACKAGE_MANAGER_GIT_REF: main
        run: ./scripts/run_sample_chain.sh

      - name: Upload package-manager sample artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: package-manager-sample-output
          path: |
            package-manager/examples/sample-package/build/output/
            package-manager/examples/sample-package/run/output/
          if-no-files-found: ignore
          retention-days: 7

  package-manager-llama-sample:
    name: "package-manager llama sample chain"
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    env:
      VM_QEMU_ACCEL: tcg
      LLAMA_MODEL_URL: https://huggingface.co/Qwen/Qwen2.5-0.5B-Instruct-GGUF/resolve/main/qwen2.5-0.5b-instruct-q2_k.gguf
    steps:
      - name: Checkout vmize
        uses: actions/checkout@v4

      - name: Checkout package-manager
        uses: actions/checkout@v4
        with:
          repository: vigilo-project/package-manager
          path: package-manager

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Cache llama model
        uses: actions/cache@v4
        with:
          path: package-manager/examples/llama-package/build/input/models/qwen2.5-0.5b-instruct-q2_k.gguf
          key: package-manager-llama-model-qwen2.5-0.5b-instruct-q2_k-v1

      - name: Download pinned GGUF model
        working-directory: package-manager
        run: |
          mkdir -p examples/llama-package/build/input/models
          if [ ! -s examples/llama-package/build/input/models/qwen2.5-0.5b-instruct-q2_k.gguf ]; then
            curl -L --fail --retry 5 --retry-all-errors \
              "$LLAMA_MODEL_URL" \
              -o examples/llama-package/build/input/models/qwen2.5-0.5b-instruct-q2_k.gguf
          fi

      - name: Install VM dependencies and image
        run: |
          cd vm
          chmod +x ./deps.sh
          sudo ./deps.sh

      - name: Run package-manager llama sample chain
        working-directory: package-manager
        env:
          VMIZE_GIT_URL: https://github.com/${{ github.repository }}.git
          VMIZE_GIT_REF: ${{ github.sha }}
          PACKAGE_MANAGER_GIT_REF: main
          LLAMA_MODEL_URL: ${{ env.LLAMA_MODEL_URL }}
        run: ./scripts/run_sample_chain.sh examples/llama-package/build

      - name: Upload package-manager llama sample artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: package-manager-llama-sample-output
          path: |
            package-manager/examples/llama-package/build/output/
            package-manager/examples/llama-package/run/output/
          if-no-files-found: ignore
          retention-days: 7
