name: macOS CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  vm:
    name: "1) VM stage"
    runs-on: macos-26
    timeout-minutes: 120
    env:
      VM_QEMU_ACCEL: tcg
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install VM dependencies and image
        run: |
          cd vm
          chmod +x ./deps.sh
          ./deps.sh

      - name: Run VM tests (includes cloud-image apt update)
        run: cargo test -p vm -- --nocapture

  batch:
    name: "2) BATCH stage"
    runs-on: macos-26
    timeout-minutes: 120
    needs: vm
    env:
      VM_QEMU_ACCEL: tcg
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install VM dependencies and image
        run: |
          cd vm
          chmod +x ./deps.sh
          ./deps.sh

      - name: Verify 4-task concurrent run
        run: |
          cargo run -p vmize -- task --concurrent \
            batch/example/split-task1 \
            batch/example/split-task2 \
            batch/example/split-task3 \
            batch/example/split-task4

      - name: Run BATCH tests
        run: cargo test -p batch -- --nocapture

  dashboard:
    name: "3) DASHBOARD stage"
    runs-on: macos-26
    timeout-minutes: 120
    needs: batch
    env:
      VM_QEMU_ACCEL: tcg
      DASHBOARD_IT: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install VM dependencies and image
        run: |
          cd vm
          chmod +x ./deps.sh
          ./deps.sh

      - name: Run DASHBOARD library tests
        run: cargo test -p dashboard --lib -- --nocapture

      - name: Run DASHBOARD API tests (includes VM end-to-end)
        run: cargo test -p dashboard --test api -- --nocapture
