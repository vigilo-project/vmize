<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VMIZE</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'SF Mono', 'Fira Code', monospace;
      background: #0f1117;
      color: #c9d1d9;
      padding: 24px;
      min-height: 100vh;
    }

    h1 {
      color: #58a6ff;
      font-size: 1.4em;
      margin-bottom: 20px;
      letter-spacing: 0.05em;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .task-dir-wrap {
      position: relative;
      flex: 1;
      min-width: 260px;
    }

    .controls input {
      padding: 8px 12px;
      background: #161b22;
      border: 1px solid #30363d;
      color: #c9d1d9;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.9em;
    }

    .controls input:focus {
      outline: none;
      border-color: #58a6ff;
    }

    .task-dir-wrap input {
      width: 100%;
    }

    .task-candidates {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      box-shadow: 0 8px 30px rgba(1, 4, 9, 0.6);
      max-height: 260px;
      overflow-y: auto;
      z-index: 20;
      display: none;
    }

    .candidate-item {
      padding: 8px 10px;
      border-bottom: 1px solid #21262d;
      cursor: pointer;
    }

    .candidate-item:last-child {
      border-bottom: none;
    }

    .candidate-item.selected,
    .candidate-item:hover {
      background: #1f2937;
    }

    .candidate-name {
      color: #e6edf3;
      font-size: 0.83em;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .candidate-meta {
      color: #8b949e;
      font-size: 0.74em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .candidate-empty {
      color: #8b949e;
      font-size: 0.78em;
      padding: 10px;
    }

    button {
      padding: 8px 18px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9em;
      font-weight: 600;
      transition: opacity 0.15s;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #add-btn  { background: #238636; color: #fff; }
    #run-btn  { background: #1f6feb; color: #fff; }

    .status-bar {
      font-size: 0.82em;
      color: #8b949e;
      margin-bottom: 20px;
      height: 1.2em;
    }

    .tasks {
      display: grid;
      gap: 16px;
    }

    .tasks.layout-1 { grid-template-columns: 1fr; }
    .tasks.layout-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .tasks.layout-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .tasks.layout-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); }

    @media (max-width: 1024px) {
      .tasks { grid-template-columns: 1fr !important; }
    }

    .task-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px;
      transition: border-color 0.2s;
    }

    .task-card.queued    { border-color: #30363d; }
    .task-card.running   { border-color: #1f6feb; }
    .task-card.succeeded { border-color: #238636; }
    .task-card.failed    { border-color: #da3633; }

    .task-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 6px;
      gap: 8px;
    }

    .task-name {
      font-weight: 700;
      font-size: 1em;
      color: #e6edf3;
      word-break: break-all;
    }

    .task-badges {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
    }

    .badge {
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.72em;
      font-weight: 600;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .badge-queued    { background: #21262d; color: #8b949e; border: 1px solid #30363d; }
    .badge-running   { background: #1f3a6e; color: #79c0ff; border: 1px solid #1f6feb; }
    .badge-succeeded { background: #1a3a24; color: #56d364; border: 1px solid #238636; }
    .badge-failed    { background: #3d1a1a; color: #ff7b72; border: 1px solid #da3633; }

    .remove-btn {
      background: none;
      border: 1px solid #30363d;
      color: #6e7681;
      border-radius: 4px;
      cursor: pointer;
      padding: 1px 7px;
      font-size: 0.78em;
      line-height: 1.4;
    }

    .remove-btn:hover {
      border-color: #da3633;
      color: #ff7b72;
    }

    .task-desc {
      color: #8b949e;
      font-size: 0.82em;
      margin-bottom: 8px;
    }

    .task-phase {
      font-size: 0.8em;
      color: #58a6ff;
      margin-bottom: 6px;
      min-height: 1em;
    }

    .progress-wrap {
      margin-bottom: 6px;
    }

    .progress-bar {
      height: 4px;
      background: #21262d;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #1f6feb;
      transition: width 0.3s ease;
      border-radius: 2px;
    }

    .script-label {
      font-size: 0.75em;
      color: #6e7681;
      margin-top: 3px;
      min-height: 1em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .log-section {
      margin-top: 8px;
    }

    .log-title {
      color: #6e7681;
      font-size: 0.72em;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }

    .log-panel {
      background: #010409;
      border: 1px solid #21262d;
      border-radius: 4px;
      padding: 6px 8px;
      font-size: 0.75em;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .vm-progress-panel {
      max-height: 90px;
      min-height: 60px;
    }

    .script-output-panel {
      max-height: 220px;
      min-height: 120px;
    }

    .log-line {
      color: #8b949e;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.45;
    }

    .log-empty {
      color: #21262d;
    }

    .task-footer {
      margin-top: 8px;
      font-size: 0.78em;
      color: #6e7681;
    }

    .task-output { color: #56d364; word-break: break-all; }
    .task-error  { color: #ff7b72; word-break: break-all; margin-top: 3px; }
  </style>
</head>
<body>
  <h1>VMIZE</h1>

  <div class="controls">
    <div class="task-dir-wrap" id="task-dir-wrap">
      <input type="text" id="task-dir" placeholder="/path/to/task-dir" autocomplete="off" />
      <div id="task-candidates" class="task-candidates"></div>
    </div>
    <button id="add-btn" onclick="addTask()">Add</button>
    <button id="run-btn" onclick="runAll()" disabled>Run All</button>
  </div>

  <div class="status-bar" id="status-bar">Connecting…</div>
  <div class="tasks" id="tasks"></div>

  <script>
    'use strict';

    const tasks = {};   // id (number) → task object
    let running = false;
    let candidatesUnavailable = false;
    let taskCandidates = [];
    let filteredCandidates = [];
    let candidateOpen = false;
    let selectedCandidateIndex = -1;

    // ── Task candidates ──────────────────────────────────────────────────────
    function loadTaskCandidates() {
      return fetch('/api/task-candidates')
        .then(r => r.json())
        .then(data => {
          taskCandidates = Array.isArray(data.tasks) ? data.tasks : [];
          candidatesUnavailable = false;
          updateCandidateFilter();
        })
        .catch(() => {
          taskCandidates = [];
          candidatesUnavailable = true;
          updateCandidateFilter();
          updateControls();
        });
    }

    loadTaskCandidates();

    // ── Load initial state ───────────────────────────────────────────────────
    fetch('/api/status')
      .then(r => r.json())
      .then(data => {
        running = data.running;
        data.tasks.forEach(j => {
          tasks[j.id] = {
            id:             j.id,
            dir:            j.dir,
            name:           j.name,
            description:    j.description,
            state:          j.state,
            phase:          j.phase,
            script_index:   j.script_index,
            script_total:   j.script_total,
            current_script: j.current_script,
            vm_progress:    Array.from(j.vm_progress_lines || []),
            script_logs:    Array.from(j.script_output_lines || []),
            elapsed_ms:     j.elapsed_ms,
            error:          j.error,
            output:         j.output,
          };
          renderTask(j.id);
        });
        updateControls();
      });

    // ── SSE ──────────────────────────────────────────────────────────────────
    function connectSse() {
      const es = new EventSource('/events');
      es.onopen    = () => setStatus(running ? 'Tasks running…' : 'Connected');
      es.onmessage = e  => handleEvent(JSON.parse(e.data));
      es.onerror   = () => {
        setStatus('Reconnecting…');
        es.close();
        setTimeout(connectSse, 2000);
      };
    }
    connectSse();

    // ── Event handling ───────────────────────────────────────────────────────
    function handleEvent(ev) {
      switch (ev.type) {

        case 'loaded':
          if (!tasks[ev.id]) {
            tasks[ev.id] = {
              id: ev.id, dir: '', name: ev.name, description: ev.description,
              state: 'queued', phase: null,
              script_index: 0, script_total: 0, current_script: null,
              vm_progress: [], script_logs: [],
              elapsed_ms: null, error: null, output: null,
            };
            renderTask(ev.id);
            updateControls();
          }
          break;

        case 'phase':
          if (tasks[ev.id]) {
            if (tasks[ev.id].state === 'queued') tasks[ev.id].state = 'running';
            tasks[ev.id].phase = ev.phase;
            renderTask(ev.id);
          }
          break;

        case 'script':
          if (tasks[ev.id]) {
            tasks[ev.id].state = 'running';
            tasks[ev.id].script_index   = ev.index;
            tasks[ev.id].script_total   = ev.total;
            tasks[ev.id].current_script = ev.done ? null : ev.name;
            renderTask(ev.id);
          }
          break;

        case 'vm_progress':
          if (tasks[ev.id]) {
            tasks[ev.id].vm_progress.push(ev.line);
            renderTask(ev.id);
          }
          break;

        case 'script_log':
          if (tasks[ev.id]) {
            tasks[ev.id].script_logs.push(ev.line);
            renderTask(ev.id);
          }
          break;

        case 'finished':
          if (tasks[ev.id]) {
            tasks[ev.id].state      = ev.success ? 'succeeded' : 'failed';
            tasks[ev.id].elapsed_ms = ev.elapsed_ms || null;
            tasks[ev.id].output     = ev.output || null;
            tasks[ev.id].error      = ev.error  || null;
            renderTask(ev.id);
          }
          {
            const allDone = Object.values(tasks).every(
              j => j.state === 'succeeded' || j.state === 'failed');
            if (allDone) { running = false; }
          }
          updateControls();
          break;
      }
    }

    // ── Render ───────────────────────────────────────────────────────────────
    function renderTask(id) {
      const j = tasks[id];
      if (!j) return;

      const container = document.getElementById('tasks');
      let card = document.getElementById('task-' + id);
      if (!card) {
        card = document.createElement('div');
        card.id = 'task-' + id;
        container.appendChild(card);
      }

      const prevVmPanel = card.querySelector('.vm-progress-panel');
      const prevScriptPanel = card.querySelector('.script-output-panel');
      const vmPinnedBottom = prevVmPanel
        ? (prevVmPanel.scrollHeight - prevVmPanel.scrollTop - prevVmPanel.clientHeight) < 8
        : true;
      const scriptPinnedBottom = prevScriptPanel
        ? (prevScriptPanel.scrollHeight - prevScriptPanel.scrollTop - prevScriptPanel.clientHeight) < 8
        : true;
      const prevVmScrollTop = prevVmPanel ? prevVmPanel.scrollTop : 0;
      const prevScriptScrollTop = prevScriptPanel ? prevScriptPanel.scrollTop : 0;

      const stateLabels = { queued: 'QUEUED', running: 'RUNNING', succeeded: 'SUCCESS', failed: 'FAILED' };
      const pct = j.script_total > 0 ? Math.round(j.script_index / j.script_total * 100) : 0;

      const vmProgressHtml = j.vm_progress.length > 0
        ? j.vm_progress.map(l => '<div class="log-line">' + esc(l) + '</div>').join('')
        : '<div class="log-line log-empty">no progress yet</div>';

      const scriptLogsHtml = j.script_logs.length > 0
        ? j.script_logs.map(l => '<div class="log-line">' + esc(l) + '</div>').join('')
        : '<div class="log-line log-empty">no output yet</div>';

      const showRemove = j.state === 'queued' && !running;

      card.className = 'task-card ' + j.state;
      card.innerHTML =
        '<div class="task-header">' +
          '<span class="task-name">' + esc(j.name || ('task-' + id)) + '</span>' +
          '<span class="task-badges">' +
            '<span class="badge badge-' + j.state + '">' + stateLabels[j.state] + '</span>' +
            (showRemove ? '<button class="remove-btn" onclick="removeTask(' + id + ')">✕</button>' : '') +
          '</span>' +
        '</div>' +
        (j.description ? '<div class="task-desc">' + esc(j.description) + '</div>' : '') +
        '<div class="task-phase">' + (j.phase ? 'phase: ' + j.phase : (j.state === 'queued' ? 'waiting…' : '')) + '</div>' +
        '<div class="progress-wrap">' +
          '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
          '<div class="script-label">' +
            (j.script_total > 0
              ? j.script_index + '/' + j.script_total + (j.current_script ? ' · ' + esc(j.current_script) : '')
              : '') +
          '</div>' +
        '</div>' +
        '<div class="log-section">' +
          '<div class="log-title">show_progress</div>' +
          '<div class="log-panel vm-progress-panel">' + vmProgressHtml + '</div>' +
        '</div>' +
        '<div class="log-section">' +
          '<div class="log-title">stdout/stderr</div>' +
          '<div class="log-panel script-output-panel">' + scriptLogsHtml + '</div>' +
        '</div>' +
        '<div class="task-footer">' +
          (j.elapsed_ms ? '<span>elapsed: ' + (j.elapsed_ms / 1000).toFixed(1) + 's</span>' : '') +
          (j.output ? '<div class="task-output">→ ' + esc(j.output) + '</div>' : '') +
          (j.error  ? '<div class="task-error">' + esc(j.error) + '</div>' : '') +
        '</div>';

      const nextVmPanel = card.querySelector('.vm-progress-panel');
      if (nextVmPanel) {
        if (vmPinnedBottom) {
          nextVmPanel.scrollTop = nextVmPanel.scrollHeight;
        } else {
          nextVmPanel.scrollTop = prevVmScrollTop;
        }
      }
      const nextScriptPanel = card.querySelector('.script-output-panel');
      if (nextScriptPanel) {
        if (scriptPinnedBottom) {
          nextScriptPanel.scrollTop = nextScriptPanel.scrollHeight;
        } else {
          nextScriptPanel.scrollTop = prevScriptScrollTop;
        }
      }
    }

    function normalizeText(v) {
      return String(v || '').toLowerCase();
    }

    function updateCandidateFilter() {
      const input = document.getElementById('task-dir');
      const query = normalizeText(input.value.trim());
      filteredCandidates = query === ''
        ? taskCandidates.slice()
        : taskCandidates.filter(c =>
            normalizeText(c.name).includes(query) ||
            normalizeText(c.description).includes(query) ||
            normalizeText(c.dir).includes(query));

      if (filteredCandidates.length === 0) {
        selectedCandidateIndex = -1;
      } else if (selectedCandidateIndex >= filteredCandidates.length) {
        selectedCandidateIndex = -1;
      }
      renderCandidates();
    }

    function renderCandidates() {
      const box = document.getElementById('task-candidates');
      if (!candidateOpen) {
        box.style.display = 'none';
        box.innerHTML = '';
        return;
      }

      box.style.display = 'block';
      if (filteredCandidates.length === 0) {
        box.innerHTML = '<div class="candidate-empty">no matching tasks</div>';
        return;
      }

      box.innerHTML = filteredCandidates.map((c, idx) =>
        '<div class="candidate-item ' + (idx === selectedCandidateIndex ? 'selected' : '') + '" ' +
          'onclick="pickCandidate(' + idx + ')" data-index="' + idx + '">' +
          '<div class="candidate-name">' + esc(c.name || c.dir) + '</div>' +
          (c.description ? '<div class="candidate-meta">' + esc(c.description) + '</div>' : '') +
          '<div class="candidate-meta">' + esc(c.dir) + '</div>' +
        '</div>'
      ).join('');
    }

    function openCandidates() {
      candidateOpen = true;
      updateCandidateFilter();
    }

    function closeCandidates() {
      candidateOpen = false;
      selectedCandidateIndex = -1;
      renderCandidates();
    }

    function pickCandidate(index) {
      const candidate = filteredCandidates[index];
      if (!candidate) return;
      const input = document.getElementById('task-dir');
      input.value = candidate.dir;
      closeCandidates();
      input.focus();
    }

    function moveCandidateSelection(delta) {
      if (!candidateOpen) {
        openCandidates();
      }
      if (filteredCandidates.length === 0) return;
      if (selectedCandidateIndex < 0) {
        selectedCandidateIndex = delta > 0 ? 0 : filteredCandidates.length - 1;
      } else {
        selectedCandidateIndex = (selectedCandidateIndex + delta + filteredCandidates.length) % filteredCandidates.length;
      }
      renderCandidates();
      const selected = document.querySelector('.candidate-item.selected');
      if (selected) selected.scrollIntoView({ block: 'nearest' });
    }

    // ── Controls ──────────────────────────────────────────────────────────────
    function addTask() {
      const dir = document.getElementById('task-dir').value.trim();
      if (!dir) { alert('Enter a task directory path'); return; }

      fetch('/api/tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ dir }),
      })
        .then(r => r.json())
        .then(data => {
          if (data.error) { alert('Error: ' + data.error); return; }
          document.getElementById('task-dir').value = '';
          closeCandidates();
          updateControls();
        })
        .catch(err => alert('Network error: ' + err));
    }

    function removeTask(id) {
      fetch('/api/tasks/' + id, { method: 'DELETE' })
        .then(r => {
          if (r.ok) {
            delete tasks[id];
            const card = document.getElementById('task-' + id);
            if (card) card.remove();
            updateControls();
          }
        });
    }

    function runAll() {
      fetch('/api/run', { method: 'POST' })
        .then(r => r.json())
        .then(data => {
          if (data.error) { alert('Error: ' + data.error); return; }
          running = true;
          updateControls();
        });
    }

    function updateControls() {
      const btn = document.getElementById('run-btn');
      const hasQueued = Object.values(tasks).some(j => j.state === 'queued');
      btn.disabled = running || !hasQueued;
      const queued  = Object.values(tasks).filter(j => j.state === 'queued').length;
      const total   = Object.keys(tasks).length;
      updateLayout(total);
      const baseStatus =
        running    ? 'Tasks running…' :
        hasQueued  ? queued + ' task' + (queued > 1 ? 's' : '') + ' queued' + (total > queued ? ', ' + (total - queued) + ' finished' : '') + ' — press Run All' :
        total > 0  ? 'All tasks finished' :
                     'No tasks — add a task directory above';
      setStatus(candidatesUnavailable ? baseStatus + ' (task picker unavailable)' : baseStatus);
    }

    function updateLayout(total) {
      const container = document.getElementById('tasks');
      container.classList.remove('layout-1', 'layout-2', 'layout-3', 'layout-4');
      if (total <= 1) {
        container.classList.add('layout-1');
      } else if (total === 2) {
        container.classList.add('layout-2');
      } else if (total === 3) {
        container.classList.add('layout-3');
      } else {
        container.classList.add('layout-4');
      }
    }

    function setStatus(msg) {
      document.getElementById('status-bar').textContent = msg;
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    const taskDirInput = document.getElementById('task-dir');
    taskDirInput.addEventListener('focus', () => openCandidates());
    taskDirInput.addEventListener('input', () => {
      candidateOpen = true;
      updateCandidateFilter();
    });
    taskDirInput.addEventListener('keydown', e => {
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        moveCandidateSelection(1);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        moveCandidateSelection(-1);
      } else if (e.key === 'Escape') {
        e.preventDefault();
        closeCandidates();
      } else if (e.key === 'Enter') {
        if (candidateOpen && selectedCandidateIndex >= 0 && filteredCandidates.length > 0) {
          e.preventDefault();
          pickCandidate(selectedCandidateIndex);
        } else {
          addTask();
        }
      }
    });

    document.addEventListener('click', e => {
      const wrap = document.getElementById('task-dir-wrap');
      if (!wrap.contains(e.target)) {
        closeCandidates();
      }
    });
  </script>
</body>
</html>
