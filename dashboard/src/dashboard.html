<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'SF Mono', 'Fira Code', monospace;
      background: #0f1117;
      color: #c9d1d9;
      padding: 24px;
      min-height: 100vh;
    }

    h1 {
      color: #58a6ff;
      font-size: 1.4em;
      margin-bottom: 20px;
      letter-spacing: 0.05em;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .controls input {
      flex: 1;
      min-width: 260px;
      padding: 8px 12px;
      background: #161b22;
      border: 1px solid #30363d;
      color: #c9d1d9;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.9em;
    }

    .controls input:focus {
      outline: none;
      border-color: #58a6ff;
    }

    button {
      padding: 8px 18px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9em;
      font-weight: 600;
      transition: opacity 0.15s;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #add-btn  { background: #238636; color: #fff; }
    #run-btn  { background: #1f6feb; color: #fff; }

    .status-bar {
      font-size: 0.82em;
      color: #8b949e;
      margin-bottom: 20px;
      height: 1.2em;
    }

    .jobs {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 16px;
    }

    .job-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px;
      transition: border-color 0.2s;
    }

    .job-card.queued    { border-color: #30363d; }
    .job-card.running   { border-color: #1f6feb; }
    .job-card.succeeded { border-color: #238636; }
    .job-card.failed    { border-color: #da3633; }

    .job-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 6px;
      gap: 8px;
    }

    .job-name {
      font-weight: 700;
      font-size: 1em;
      color: #e6edf3;
      word-break: break-all;
    }

    .job-badges {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
    }

    .badge {
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.72em;
      font-weight: 600;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .badge-queued    { background: #21262d; color: #8b949e; border: 1px solid #30363d; }
    .badge-running   { background: #1f3a6e; color: #79c0ff; border: 1px solid #1f6feb; }
    .badge-succeeded { background: #1a3a24; color: #56d364; border: 1px solid #238636; }
    .badge-failed    { background: #3d1a1a; color: #ff7b72; border: 1px solid #da3633; }

    .remove-btn {
      background: none;
      border: 1px solid #30363d;
      color: #6e7681;
      border-radius: 4px;
      cursor: pointer;
      padding: 1px 7px;
      font-size: 0.78em;
      line-height: 1.4;
    }

    .remove-btn:hover {
      border-color: #da3633;
      color: #ff7b72;
    }

    .job-desc {
      color: #8b949e;
      font-size: 0.82em;
      margin-bottom: 8px;
    }

    .job-phase {
      font-size: 0.8em;
      color: #58a6ff;
      margin-bottom: 6px;
      min-height: 1em;
    }

    .progress-wrap {
      margin-bottom: 6px;
    }

    .progress-bar {
      height: 4px;
      background: #21262d;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #1f6feb;
      transition: width 0.3s ease;
      border-radius: 2px;
    }

    .script-label {
      font-size: 0.75em;
      color: #6e7681;
      margin-top: 3px;
      min-height: 1em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .job-logs {
      background: #010409;
      border: 1px solid #21262d;
      border-radius: 4px;
      padding: 6px 8px;
      font-size: 0.75em;
      height: 58px;
      overflow: hidden;
      margin-top: 8px;
    }

    .log-line {
      color: #8b949e;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.45;
    }

    .log-empty {
      color: #21262d;
    }

    .job-footer {
      margin-top: 8px;
      font-size: 0.78em;
      color: #6e7681;
    }

    .job-output { color: #56d364; word-break: break-all; }
    .job-error  { color: #ff7b72; word-break: break-all; margin-top: 3px; }
  </style>
</head>
<body>
  <h1>dashboard</h1>

  <div class="controls">
    <input type="text" id="job-dir" placeholder="/path/to/job-dir" />
    <button id="add-btn" onclick="addJob()">Add</button>
    <button id="run-btn" onclick="runAll()" disabled>Run All</button>
  </div>

  <div class="status-bar" id="status-bar">Connecting…</div>
  <div class="jobs" id="jobs"></div>

  <script>
    'use strict';

    const jobs = {};   // id (number) → job object
    let running = false;

    // ── Load initial state ───────────────────────────────────────────────────
    fetch('/api/status')
      .then(r => r.json())
      .then(data => {
        running = data.running;
        data.jobs.forEach(j => {
          jobs[j.id] = {
            id:             j.id,
            dir:            j.dir,
            name:           j.name,
            description:    j.description,
            state:          j.state,
            phase:          j.phase,
            script_index:   j.script_index,
            script_total:   j.script_total,
            current_script: j.current_script,
            logs:           Array.from(j.recent_logs || []),
            elapsed_ms:     j.elapsed_ms,
            error:          j.error,
            output:         j.output,
          };
          renderJob(j.id);
        });
        updateControls();
      });

    // ── SSE ──────────────────────────────────────────────────────────────────
    function connectSse() {
      const es = new EventSource('/events');
      es.onopen    = () => setStatus(running ? 'Jobs running…' : 'Connected');
      es.onmessage = e  => handleEvent(JSON.parse(e.data));
      es.onerror   = () => {
        setStatus('Reconnecting…');
        es.close();
        setTimeout(connectSse, 2000);
      };
    }
    connectSse();

    // ── Event handling ───────────────────────────────────────────────────────
    function handleEvent(ev) {
      switch (ev.type) {

        case 'loaded':
          if (!jobs[ev.id]) {
            jobs[ev.id] = {
              id: ev.id, dir: '', name: ev.name, description: ev.description,
              state: 'queued', phase: null,
              script_index: 0, script_total: 0, current_script: null,
              logs: [], elapsed_ms: null, error: null, output: null,
            };
            renderJob(ev.id);
            updateControls();
          }
          break;

        case 'phase':
          if (jobs[ev.id]) {
            if (jobs[ev.id].state === 'queued') jobs[ev.id].state = 'running';
            jobs[ev.id].phase = ev.phase;
            renderJob(ev.id);
          }
          break;

        case 'script':
          if (jobs[ev.id]) {
            jobs[ev.id].state = 'running';
            jobs[ev.id].script_index   = ev.index;
            jobs[ev.id].script_total   = ev.total;
            jobs[ev.id].current_script = ev.done ? null : ev.name;
            if (!ev.done) jobs[ev.id].logs = [];
            renderJob(ev.id);
          }
          break;

        case 'log':
          if (jobs[ev.id]) {
            jobs[ev.id].logs.push(ev.line);
            if (jobs[ev.id].logs.length > 3)
              jobs[ev.id].logs = jobs[ev.id].logs.slice(-3);
            renderJob(ev.id);
          }
          break;

        case 'finished':
          if (jobs[ev.id]) {
            jobs[ev.id].state      = ev.success ? 'succeeded' : 'failed';
            jobs[ev.id].elapsed_ms = ev.elapsed_ms || null;
            jobs[ev.id].output     = ev.output || null;
            jobs[ev.id].error      = ev.error  || null;
            renderJob(ev.id);
          }
          {
            const allDone = Object.values(jobs).every(
              j => j.state === 'succeeded' || j.state === 'failed');
            if (allDone) { running = false; }
          }
          updateControls();
          break;
      }
    }

    // ── Render ───────────────────────────────────────────────────────────────
    function renderJob(id) {
      const j = jobs[id];
      if (!j) return;

      const container = document.getElementById('jobs');
      let card = document.getElementById('job-' + id);
      if (!card) {
        card = document.createElement('div');
        card.id = 'job-' + id;
        container.appendChild(card);
      }

      const stateLabels = { queued: 'QUEUED', running: 'RUNNING', succeeded: 'SUCCESS', failed: 'FAILED' };
      const pct = j.script_total > 0 ? Math.round(j.script_index / j.script_total * 100) : 0;

      const logsHtml = j.logs.length > 0
        ? j.logs.map(l => '<div class="log-line">' + esc(l) + '</div>').join('')
        : '<div class="log-line log-empty">no output yet</div>';

      const showRemove = j.state === 'queued' && !running;

      card.className = 'job-card ' + j.state;
      card.innerHTML =
        '<div class="job-header">' +
          '<span class="job-name">' + esc(j.name || ('job-' + id)) + '</span>' +
          '<span class="job-badges">' +
            '<span class="badge badge-' + j.state + '">' + stateLabels[j.state] + '</span>' +
            (showRemove ? '<button class="remove-btn" onclick="removeJob(' + id + ')">✕</button>' : '') +
          '</span>' +
        '</div>' +
        (j.description ? '<div class="job-desc">' + esc(j.description) + '</div>' : '') +
        '<div class="job-phase">' + (j.phase ? 'phase: ' + j.phase : (j.state === 'queued' ? 'waiting…' : '')) + '</div>' +
        '<div class="progress-wrap">' +
          '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
          '<div class="script-label">' +
            (j.script_total > 0
              ? j.script_index + '/' + j.script_total + (j.current_script ? ' · ' + esc(j.current_script) : '')
              : '') +
          '</div>' +
        '</div>' +
        '<div class="job-logs">' + logsHtml + '</div>' +
        '<div class="job-footer">' +
          (j.elapsed_ms ? '<span>elapsed: ' + (j.elapsed_ms / 1000).toFixed(1) + 's</span>' : '') +
          (j.output ? '<div class="job-output">→ ' + esc(j.output) + '</div>' : '') +
          (j.error  ? '<div class="job-error">' + esc(j.error) + '</div>' : '') +
        '</div>';
    }

    // ── Controls ──────────────────────────────────────────────────────────────
    function addJob() {
      const dir = document.getElementById('job-dir').value.trim();
      if (!dir) { alert('Enter a job directory path'); return; }

      fetch('/api/jobs', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ dir }),
      })
        .then(r => r.json())
        .then(data => {
          if (data.error) { alert('Error: ' + data.error); return; }
          document.getElementById('job-dir').value = '';
          updateControls();
        })
        .catch(err => alert('Network error: ' + err));
    }

    function removeJob(id) {
      fetch('/api/jobs/' + id, { method: 'DELETE' })
        .then(r => {
          if (r.ok) {
            delete jobs[id];
            const card = document.getElementById('job-' + id);
            if (card) card.remove();
            updateControls();
          }
        });
    }

    function runAll() {
      fetch('/api/run', { method: 'POST' })
        .then(r => r.json())
        .then(data => {
          if (data.error) { alert('Error: ' + data.error); return; }
          running = true;
          updateControls();
        });
    }

    function updateControls() {
      const btn = document.getElementById('run-btn');
      const hasQueued = Object.values(jobs).some(j => j.state === 'queued');
      btn.disabled = running || !hasQueued;
      const queued  = Object.values(jobs).filter(j => j.state === 'queued').length;
      const total   = Object.keys(jobs).length;
      setStatus(
        running    ? 'Jobs running…' :
        hasQueued  ? queued + ' job' + (queued > 1 ? 's' : '') + ' queued' + (total > queued ? ', ' + (total - queued) + ' finished' : '') + ' — press Run All' :
        total > 0  ? 'All jobs finished' :
                     'No jobs — add a job directory above'
      );
    }

    function setStatus(msg) {
      document.getElementById('status-bar').textContent = msg;
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // Handle enter key in input
    document.getElementById('job-dir')
      .addEventListener('keydown', e => { if (e.key === 'Enter') addJob(); });
  </script>
</body>
</html>
