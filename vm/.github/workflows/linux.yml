name: Linux CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      VM_QEMU_ACCEL: tcg
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies and prepare image
        run: |
          chmod +x ./deps.sh
          sudo ./deps.sh
      - name: Run all tests
        run: cargo test -- --nocapture

